name: 更新逆價差 carry.json

on:
  schedule:
    # 每月 1 號 01:00 UTC(≈ 台灣 09:00)。月更:逆價差用多年視窗算,日更/週更無意義;
    # 且月更(<60天)可避免 GitHub 自動停用閒置的排程 workflow。
    - cron: '0 1 1 * *'
  workflow_dispatch: {}   # 允許在 Actions 分頁手動「Run workflow」

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 計算並寫入 carry.json
        run: node scripts/update_carry.js

      - name: 若有變更則 commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add carry.json
          if git diff --staged --quiet; then
            echo "carry.json 無變更,略過 commit。"
          else
            git commit -m "chore: 更新 carry.json (逆價差自動估算) [skip ci]"
            git push
          fi
